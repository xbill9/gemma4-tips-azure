[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
check_untyped_defs = true
disable_error_code = ["attr-defined"]

[[tool.mypy.overrides]]
module = "google.cloud.*"
ignore_missing_imports = true
